name: build_and_test

# just builds benchmark on ubuntu with gcc/clang

'on':
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' || !github.ref }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        compiler: [g++-13, clang++-18]
        cpp_standard: [20]
        build_type: [Debug, Release]
    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build lld gcc-13 clang-18
          sudo ln -sf /usr/local/bin/ld /usr/bin/lld

      - name: Configure CMake
        run: |
          cmake .                                         \
            -DCMAKE_BUILD_TYPE=${{matrix.build_type}}     \
            -DCMAKE_CXX_COMPILER=${{matrix.compiler}}     \
            -DCMAKE_CXX_STANDARD=${{matrix.cpp_standard}} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5            \
            -B build -G "Ninja"

      - name: Build
        run: |
          cmake --build build
